# Declare a virtual server block to define how Nginx handles incoming HTTP traffic.
server {
    # Listen on port 80, the standard port for unencrypted HTTP web traffic.
    listen 80;
    
    # Identify the domain names/IPs this block responds to. In local container setups, this is "localhost".
    server_name localhost;

    # Handle all general requests at the root level (/) or nested assets.
    location / {
        # Define the directory where compiled frontend HTML/JS/CSS static files are located.
        root /usr/share/nginx/html;
        # Define the default files Nginx should serve if the client requests a directory instead of a specific file.
        index index.html index.htm;
        # Crucial for Single Page Apps (React Router). Check for a physical file matching the URI ($uri), then a directory ($uri/).
        # If neither exists, fallback and return "index.html" so the React router can resolve the path client-side.
        try_files $uri $uri/ /index.html;
    }

    # Intercept and handle all backend-facing API requests that start with "/api".
    location /api {
        # Proxy these requests to the Express backend container. "backend" is the DNS name resolved by Docker on port 8000.
        proxy_pass http://backend:8000;
        # Force HTTP/1.1 to support keep-alive connections and WebSocket transitions.
        proxy_http_version 1.1;
        # Set HTTP headers to allow WebSocket connection upgrades (critical for hot reload / socket.io integrations).
        proxy_set_header Upgrade $http_upgrade;
        # Explicitly declare the Connection upgrade header to preserve standard HTTP handshake protocols.
        proxy_set_header Connection 'upgrade';
        # Pass the original host name header from the client to the backend application.
        proxy_set_header Host $host;
        # Bypass caching when active WebSocket upgrade headers are present to prevent connection drops.
        proxy_cache_bypass $http_upgrade;
    }

    # Configure custom error page routing for standard server-side error statuses (500, 502, 503, 504).
    error_page 500 502 503 504 /50x.html;
    # Define how to handle the "/50x.html" endpoint.
    location = /50x.html {
        # Serve the physical 50x.html error file from the public assets root.
        root /usr/share/nginx/html;
    }
}

