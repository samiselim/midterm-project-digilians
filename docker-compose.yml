version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: leavetrack_db
    restart: always
    environment:
      POSTGRES_DB: LeaveTrackDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d LeaveTrackDB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leavetrack_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=LeaveTrackDB
      - DB_USER=postgres
      - DB_PASSWORD=password
      - JWT_SECRET=supersecretjwtkeyforlocaldevelopment
      - DB_SSL=false
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leavetrack_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
