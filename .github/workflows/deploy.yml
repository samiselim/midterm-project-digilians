name: Deploy Pipeline
run-name: Deploy [BE:${{ inputs.deploy_backend }} FE:${{ inputs.deploy_frontend }}] to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Deployment Environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      deploy_backend:
        description: 'Deploy Backend Service Changes?'
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy Frontend Service Changes?'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    name: Execute Rolling Deploy
    if: ${{ inputs.deploy_backend || inputs.deploy_frontend }}
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      # 1. Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 2. Dynamically discover the Target EC2 Instance IP
      - name: Retrieve EC2 Instance IP
        id: ec2-lookup
        run: |
          echo "Looking up EC2 Instance with Name '${{ inputs.environment }}-web-server'"
          INSTANCE_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ inputs.environment }}-web-server" "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].PublicIpAddress" \
            --output text)
          
          if [ -z "$INSTANCE_IP" ] || [ "$INSTANCE_IP" = "None" ]; then
            echo "Error: No running EC2 Instance found for environment ${{ inputs.environment }}"
            exit 1
          fi
          
          echo "Found Instance IP: $INSTANCE_IP"
          echo "instance_ip=$INSTANCE_IP" >> $GITHUB_OUTPUT

      # 3. Deploy via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.ec2-lookup.outputs.instance_ip }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ec2-user/app
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            docker compose pull
            docker compose up -d --remove-orphans