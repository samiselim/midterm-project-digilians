name: Deploy Pipeline
run-name: Deploy [BE:${{ inputs.deploy_backend }} FE:${{ inputs.deploy_frontend }}] to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Deployment Environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      deploy_backend:
        description: 'Deploy Backend Service Changes?'
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy Frontend Service Changes?'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    name: Execute Rolling Deploy
    if: ${{ inputs.deploy_backend || inputs.deploy_frontend }}
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: aws login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      # 1. Deploy via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ec2-user/app
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            docker compose pull
            docker compose up -d --remove-orphans