# Name of the pipeline displayed in the GitHub Actions UI.
name: Infrastructure Pipeline
run-name: 'Infrastructure Pipeline run by ${{ github.actor }} for ${{ github.event.inputs.environment }} environment'
# Configure manual workflow execution triggers.
on:
  workflow_dispatch:
    # Accept inputs from the operator when executing the pipeline.
    inputs:
      # Target deployment environment choice.
      environment:
        description: 'Target AWS Environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      # Desired Terraform deployment action selection.
      action:
        description: 'Terraform Action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

# Set execution permission levels.
permissions:
  # Allow the runner to read repository codebase files.
  contents: read

jobs:
  # Define the single job executing our Terraform run.
  terraform:
    # Run commands on the standard GitHub-hosted Ubuntu environment.
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    # Establish workspace environment defaults.
    defaults:
      run:
        # Force all command line shell executions to run from within the "/infra" folder context.
        working-directory: ./infra

    steps:
      # 1. Checkout repository code onto the runner workspace.
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configure AWS Credentials using static Access Key and Secret Key.
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      # 3. Download and configure the Terraform CLI binary.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # Pin version to 1.5.7 for configuration compatibility.
          terraform_version: 1.5.7

      # 4. Initialize Terraform and dynamically configure the remote S3 backend storage.
      # This resolves backend configuration keys dynamically based on the target environment (e.g. dev state vs prod state).
      - name: Terraform Init
        run: |
          terraform init -backend-config="backend_${{ github.event.inputs.environment }}.hcl"

      # 5. Run syntax and config validation checks to confirm HCL compliance.
      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform plan -var-file=environments/${{ github.event.inputs.environment }}.tfvars 
      
      - name: Terraform Apply
        if: ${{github.event.inputs.action == 'apply'}}
        run: terraform apply -var-file=environments/${{ github.event.inputs.environment }}.tfvars --auto-approve

      - name: Terraform Destroy
        if: ${{github.event.inputs.action == 'destroy'}}
        run: terraform destroy -var-file=environments/${{ github.event.inputs.environment }}.tfvars --auto-approve
