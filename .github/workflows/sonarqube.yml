name: SonarCloud Analysis

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disables shallow clone so Sonar can read git history/blame

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}     # Your stored secret
        with:
          args: >
            -Dsonar.organization=sami-devsecops-org
            -Dsonar.projectKey=sami-devsecops-org_midterm-project
            -Dsonar.sources=.