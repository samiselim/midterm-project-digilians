# Name of the code quality pipeline displayed in the GitHub Actions UI.
name: Code Quality Pipeline (SonarQube)

# Configure automatic triggers.
on:
  push:
    # Trigger scan when code is committed directly to the main production branch.
    branches:
      - main
  pull_request:
    # Trigger scan when a pull request is opened targeting the main branch.
    branches:
      - main
  # Enable manual pipeline trigger.
  workflow_dispatch:

jobs:
  # Job definition for executing the static code analysis.
  sonarqube:
    # Human-readable name.
    name: SonarQube Scan
    # Run commands on the standard GitHub-hosted Ubuntu environment.
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code onto the runner workspace.
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          # Fetch the entire git commit history (depth 0) instead of just the latest commit. 
          # This enables SonarQube to parse git blame information and compute accurate authorship and code aging data.
          fetch-depth: 0

      # 2. Run SonarQube static code analysis.
      - name: SonarQube Scan
        # Official SonarQube scan action plugin.
        uses: sonarsource/sonarqube-scan-action@master
        env:
          # Secret authorization token for authentication.
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # URL host address pointing to our central SonarQube server.
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          # Define command line configuration parameters passed to the SonarQube scanner.
          args: >
            # Unique identifier key for this project in the SonarQube dashboard.
            -Dsonar.projectKey=leave-management-system
            # Readable project name on the server.
            -Dsonar.projectName="Leave Management System"
            # Target folders to scan.
            -Dsonar.sources=backend,frontend/src
            # Exclude compiled files, node modules, and test scripts to avoid scanning noise.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.js,**/*.test.js
            # Point to the code coverage output file generated by test runners.
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      # 3. Check Quality Gate status.
      # This step queries the SonarQube server and fails the build job if quality thresholds (vulnerability count, code quality metrics) are missed.
      - name: SonarQube Quality Gate
        # Official Quality Gate check plugin.
        uses: sonarsource/sonarqube-quality-gate-action@master
        # Fail the step if response takes longer than 5 minutes.
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

